<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The RSI Loop — LinkedIn Hero Card</title>
<meta name="description" content="1200x1200 hero card for the LinkedIn launch post. Punchline overlay on Otto Norin's skeletal-hand photo (Unsplash, free licence with attribution).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Inter:wght@400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<!--
  Sized to be screenshotted at exactly 1200×1200 px.

  Capture:
    macOS:   Cmd-Shift-5 → Capture Selected Portion → drag the .card frame.
    Chrome:  DevTools → Capture node screenshot on `.card`.
    CLI:     headless Chrome (see render command in repo history).

  Photo: Otto Norin via Unsplash. Unsplash License — free for commercial
  and non-commercial use; attribution rendered in-card.
-->

<style>
:root {
--ink: #0f1a2e;
--teal: #0d7377;
--teal-light: #aee3e5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
background: #1a1a1a;
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
}
body {
display: flex;
align-items: center;
justify-content: center;
min-height: 100vh;
padding: 24px;
}

/* === THE CARD — exactly 1200×1200, screenshot-ready === */
.card {
width: 1200px;
height: 1200px;
position: relative;
overflow: hidden;
background-image: url('otto-norin-skeletal-hand.jpg');
background-size: cover;
background-position: center 60%;
box-shadow: 0 12px 48px rgba(0,0,0,0.25);
}

/* Vignette + bottom darken, so the white serif reads cleanly over the
   wooden surface in the lower third of the photo. */
.card::before {
content: '';
position: absolute;
inset: 0;
background:
radial-gradient(ellipse at 60% 40%, transparent 0%, rgba(15,26,46,0.18) 70%, rgba(15,26,46,0.45) 100%),
linear-gradient(to bottom,
rgba(15,26,46,0) 0%,
rgba(15,26,46,0) 35%,
rgba(15,26,46,0.55) 65%,
rgba(15,26,46,0.88) 100%);
pointer-events: none;
}

/* Top-left brand kicker */
.kicker {
position: absolute;
top: 56px;
left: 64px;
z-index: 2;
font-family: 'Fira Code', monospace;
font-size: 14px;
font-weight: 500;
letter-spacing: 0.24em;
text-transform: uppercase;
color: rgba(255,255,255,0.92);
display: inline-flex;
align-items: center;
gap: 14px;
text-shadow: 0 1px 6px rgba(0,0,0,0.4);
}
.kicker::before {
content: '';
width: 9px;
height: 9px;
background: var(--teal);
border-radius: 50%;
display: inline-block;
}

/* Headline — the joke */
.headline {
position: absolute;
left: 64px;
right: 64px;
bottom: 138px;
z-index: 2;
font-family: 'Newsreader', serif;
font-weight: 300;
font-size: 80px;
line-height: 1.04;
letter-spacing: -0.025em;
color: #ffffff;
max-width: 14ch;
text-shadow: 0 2px 12px rgba(0,0,0,0.45);
}
.headline em {
font-style: italic;
font-weight: 300;
color: var(--teal-light);
}
.headline .end-stop {
color: var(--teal);
}

/* Footer line */
.foot {
position: absolute;
left: 64px;
right: 64px;
bottom: 56px;
z-index: 2;
display: flex;
justify-content: space-between;
align-items: baseline;
font-family: 'Fira Code', monospace;
font-size: 14px;
letter-spacing: 0.05em;
color: rgba(255,255,255,0.65);
text-shadow: 0 1px 4px rgba(0,0,0,0.45);
}
.foot-right {
color: rgba(255,255,255,0.92);
font-weight: 500;
}
</style>
</head>
<body>

<div class="card" id="card">

<span class="kicker">The RSI Loop · pharmatools.ai</span>

<h1 class="headline">I built an <em>RSI</em> for my <em>RSI</em> caused by building <em>RSIs</em><span class="end-stop">.</span></h1>

<div class="foot">
<span>Photo: Otto Norin / Unsplash</span>
<span class="foot-right">github.com/nickjlamb/rsi-loop</span>
</div>

</div>

</body>
</html>
